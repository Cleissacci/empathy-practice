<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 28px; }
  .row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .swatch { padding: 20px 24px; border-radius: var(--radius-xl); border: 1px solid var(--color-border-light); }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-text-muted); font-family: var(--font-mono); margin: 22px 0 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Logo, BreathWave } = window.LuminaDesignSystem_f39716;
function Demo() {
  return (
    <div>
      <div className="row">
        <div className="swatch" style={{ background: 'var(--color-surface)' }}><Logo size={40} /></div>
        <div className="swatch" style={{ background: 'var(--color-primary)' }}><Logo variant="reversed" size={40} /></div>
        <div className="swatch" style={{ background: 'var(--color-surface)' }}><Logo showWordmark={false} size={48} /></div>
      </div>
      <div className="lbl">Signature motif — the breath wave</div>
      <div className="swatch" style={{ background: 'var(--color-surface)' }}>
        <BreathWave height={48} />
        <div style={{ marginTop: 16 }}><BreathWave height={20} opacity={0.25} /></div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
