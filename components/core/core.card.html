<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 28px; }
  .group { display: flex; flex-direction: column; gap: 22px; }
  .row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-text-muted); font-family: var(--font-mono); margin-bottom: 10px; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Badge, Avatar, Card, CardHeader, CardTitle, CardDescription, CardBody, CardFooter, ProgressBar } = window.LuminaDesignSystem_f39716;
const Heart = (p) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
const Arrow = (p) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;

function Demo() {
  return (
    <div className="group">
      <div>
        <div className="lbl">Buttons — variants & sizes</div>
        <div className="row">
          <Button variant="primary">Start Learning</Button>
          <Button variant="secondary">View Modules</Button>
          <Button variant="accent" iconRight={<Arrow/>}>Book a Session</Button>
          <Button variant="ghost">Cancel</Button>
          <Button variant="danger">Remove</Button>
          <Button variant="link">Learn more →</Button>
        </div>
        <div className="row" style={{ marginTop: 14 }}>
          <Button size="sm">Small</Button>
          <Button size="md">Medium</Button>
          <Button size="lg">Large</Button>
          <Button disabled>Disabled</Button>
          <IconButton aria-label="Favorite"><Heart/></IconButton>
        </div>
      </div>
      <div>
        <div className="lbl">Badges</div>
        <div className="row">
          <Badge tone="teal" dot>In Progress</Badge>
          <Badge tone="success" dot>Completed</Badge>
          <Badge tone="amber" dot>Pending Review</Badge>
          <Badge tone="rose" dot>Needs Attention</Badge>
          <Badge tone="neutral" dot>Not Started</Badge>
          <Badge outline>Optional</Badge>
        </div>
      </div>
      <div>
        <div className="lbl">Avatars</div>
        <div className="row">
          <Avatar size="sm" initials="MJ" />
          <Avatar size="md" initials="MJ" />
          <Avatar size="lg" initials="MJ" />
          <Avatar size="lg" tone="accent" initials="DR" />
          <Avatar size="lg" tone="rose" initials="SA" />
        </div>
      </div>
      <div>
        <div className="lbl">Cards</div>
        <div className="cards">
          <Card variant="default" interactive>
            <CardHeader>
              <Badge tone="teal" dot>Module 1</Badge>
              <CardTitle style={{ marginTop: 10 }}>Introduction to Empathy</CardTitle>
              <CardDescription>What empathy is — and what it isn't.</CardDescription>
            </CardHeader>
            <CardBody><ProgressBar value={72} label="Progress" /></CardBody>
            <CardFooter>
              <span style={{ fontSize: 12, color: 'var(--color-text-muted)', fontWeight: 500 }}>45 min · 6 lessons</span>
              <Button size="sm">Continue</Button>
            </CardFooter>
          </Card>
          <Card variant="tinted">
            <CardHeader>
              <Badge tone="teal">Reflection</Badge>
              <CardDescription style={{ fontFamily: 'var(--font-display)', fontSize: 18, fontStyle: 'italic', color: 'var(--color-primary)', marginTop: 10 }}>"Describe a time you felt genuinely understood."</CardDescription>
            </CardHeader>
            <CardFooter style={{ borderTop: 'none' }}>
              <span style={{ fontSize: 12, color: 'var(--color-text-muted)', fontWeight: 500 }}>Daily journal</span>
              <Button size="sm">Write →</Button>
            </CardFooter>
          </Card>
          <Card variant="accent">
            <CardHeader>
              <Badge tone="amber" dot>Module 2</Badge>
              <CardTitle style={{ marginTop: 10 }}>Perspective Taking</CardTitle>
              <CardDescription>Stepping into another's frame of reference.</CardDescription>
            </CardHeader>
            <CardFooter style={{ borderTop: 'none' }}>
              <span style={{ fontSize: 12, color: 'var(--color-text-muted)', fontWeight: 500 }}>60 min · 8 lessons</span>
              <Button size="sm" variant="secondary">Start</Button>
            </CardFooter>
          </Card>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
