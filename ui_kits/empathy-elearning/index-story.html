// ── Certificate (canvas → PNG download) ──
function certDrawMark(x, cx, cy, s) {

function certDrawWave(x, px, py, w) {

    if (x.measureText(t).width > maxW && line) { x.fillText(line, cx, y); line = w; y += lh; } else line = t;

  x.fillStyle = '#1A2E35'; x.font = '700 26px Nunito'; x.letterSpacing = '6px'; x.fillText('LUMINA  PSYCHOLOGY', W / 2, 290); x.letterSpacing = '0px';
  x.fillStyle = '#C4956A'; x.font = '700 23px Nunito'; x.letterSpacing = '5px'; x.fillText('CERTIFICATE OF COMPLETION', W / 2, 382); x.letterSpacing = '0px';
  x.fillStyle = '#1A2E35'; x.font = '400 92px "Cormorant Garamond"'; x.fillText('The Empathy Practice', W / 2, 478);
  x.fillStyle = '#637074'; x.font = '400 25px Nunito'; x.fillText('This certifies that', W / 2, 556);
  x.fillStyle = '#2A5C6B'; x.font = 'italic 400 76px "Cormorant Garamond"'; x.fillText(name, W / 2, 642);

  x.strokeStyle = 'rgba(42,92,107,0.3)'; x.lineWidth = 1.5; x.beginPath(); x.moveTo(W / 2 - nw / 2, 670); x.lineTo(W / 2 + nw / 2, 670); x.stroke();
  x.fillStyle = '#637074'; x.font = '400 23px Nunito';
  certWrap(x, 'has completed all five modules of the Lumina Empathy Course, demonstrating practised skill in perspective taking, active listening, and empathy under pressure.', W / 2, 722, 1000, 34);
  certDrawWave(x, W / 2 - 280, 840, 560);
  const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  x.fillStyle = '#9BA8AB'; x.font = '700 19px Nunito'; x.letterSpacing = '2px';
  x.fillText('COMPLETED', W * 0.33, 968); x.fillText('KNOWLEDGE CHECK', W * 0.67, 968); x.letterSpacing = '0px';
  x.fillStyle = '#1A2E35'; x.font = '400 33px "Cormorant Garamond"';

function loadProgress() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) return { index: 0, tabs: {}, hotspots: {}, drag: {}, answers: {}, reflections: {}, scenarios: {}, narrated: {}, furthest: 0, muted: false, name: '', ...JSON.parse(raw), story: true };
  } catch (e) {}
  return { index: 0, tabs: {}, hotspots: {}, drag: {}, answers: {}, reflections: {}, scenarios: {}, narrated: {}, furthest: 0, muted: false, name: '', story: true };
}

// Slide stage — drives staggered card entry/exit via CSS classes.
// Uses transitions (not keyframes) so cards always settle to the visible state.
function SlideStage({ leaving, fullBleed, children }) {
  const [entered, setEntered] = useState(false);
  useEffect(() => { const t = setTimeout(() => setEntered(true), 30); return () => clearTimeout(t); }, []);
  const phase = leaving ? 'is-out' : entered ? 'is-in' : 'is-enter';
  const base = fullBleed
    ? { flex: 1, display: 'flex' }
    : { flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: 'clamp(28px,5vw,56px) clamp(20px,4vw,40px)' };
  return <div className={'slide-stage ' + phase} style={base}>{children}</div>;
}

function App() {
  const [p, setP] = useState(loadProgress);
  const index = Math.min(p.index, SLIDES.length - 1);
  const slide = SLIDES[index];
  const sl = (p.story && COURSE.story[slide.id]) ? { ...slide, ...COURSE.story[slide.id] } : slide;
  const furthest = Math.max(p.furthest || 0, index);
  const muted = !!p.muted;
  const hasTTS = typeof window !== 'undefined' && 'speechSynthesis' in window;
  // Gemini narrator voice (provided by ai-backend.js on hosted deploys). When
  // absent (Claude preview / local file://) narration uses the browser voice.
  const hasAITTS = () => !!(window.claude && typeof window.claude.tts === 'function');
  const canSpeak = hasTTS || hasAITTS();
  const NARRATOR_VOICE = 'Sulafat'; // warm, literary — distinct from the character voices
  const narrAudioRef = useRef(null);
  const narrGenRef = useRef(0); // bumped on every stop, to cancel stale in-flight narration TTS
  const [tocOpen, setTocOpen] = useState(false);
  const [speaking, setSpeaking] = useState(false);
  const [paused, setPaused] = useState(false);

  const immersive = slide.type === 'cover' || slide.type === 'complete';
  const fullBleed = slide.type === 'section';
  const hideNext = slide.type === 'section';

  useEffect(() => { try { localStorage.setItem(KEY, JSON.stringify(p)); } catch (e) {} }, [p]);
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'ArrowRight') tryNext(); if (e.key === 'ArrowLeft') back(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  });

  const update = (patch) => setP((prev) => ({ ...prev, ...patch }));

  // ── quiz score ──
  const quizCorrect = COURSE.quiz.filter((q) => { const a = p.answers[q.id]; return a && a.submitted && a.choice === q.answer; }).length;
  const quizScore = Math.round((quizCorrect / COURSE.quiz.length) * 100);
  // ── capstone score (drives completion gate + certificate) ──
  const capSlide = SLIDES.find((s) => s.type === 'capstone');
  const capState = capSlide ? p.scenarios[capSlide.id] : null;
  const capstoneScore = capState ? Math.max((capState.bestScore | 0), ((capState.feedback && capState.feedback.score) | 0)) : 0;

  // ── completion gating ──
  function isComplete(sl) {
    if (!sl) return true;
    switch (sl.type) {
      case 'tabs': { const v = p.tabs[sl.id] || {}; return sl.tabs.every((_, i) => v[i]); }
      case 'hotspots': { const o = p.hotspots[sl.id] || {}; return sl.cards.every((_, i) => o[i]); }
      case 'dragdrop': { const d = p.drag[sl.id]; return !!(d && d.submitted); }
      case 'question': { const a = p.answers[sl.data.id]; return !!(a && a.submitted); }
      case 'scenario': { const a = p.scenarios[sl.id]; return !!(a && a.submitted); }
      case 'roleplay': { const a = p.scenarios[sl.id]; return !!(a && a.ended && a.feedback); }
      case 'capstone': { const a = p.scenarios[sl.id]; if (!(a && a.ended && a.feedback)) return false; const best = Math.max((a.bestScore || 0), (a.feedback.score || 0)); return best >= (sl.passing || 70) || (a.attempts || 0) >= 2; }
      case 'results': return quizScore >= sl.passing;
      default: return true;
    }
  }
  const gated = slide.gate || slide.type === 'results' || slide.type === 'question';
  const canAdvance = !gated || isComplete(slide);

  const navLock = useRef(false);
  const [leaving, setLeaving] = useState(false);
  const EXIT_MS = 240;
  const transitionTo = (i) => {
    const ni = Math.max(0, Math.min(SLIDES.length - 1, i));
    if (ni === index || navLock.current) return;
    navLock.current = true;
    setLeaving(true);
    setTimeout(() => {
      setP((prev) => ({ ...prev, index: ni, furthest: Math.max(prev.furthest || 0, ni) }));
      setLeaving(false); navLock.current = false;
    }, EXIT_MS);
  };
  const goTo = transitionTo;
  const next = () => transitionTo(index + 1);
  const back = () => transitionTo(index - 1);
  const tryNext = () => { if (canAdvance && index < SLIDES.length - 1) next(); };

  const restart = () => { if (window.confirm('Restart the module from the beginning? Your saved answers and reflections will be cleared.')) {
    stopNarration();
    setLeaving(true);
    setTimeout(() => { setP({ index: 0, tabs: {}, hotspots: {}, drag: {}, answers: {}, reflections: {}, scenarios: {}, furthest: 0, muted, name: p.name || '' }); setLeaving(false); navLock.current = false; }, EXIT_MS);
  } };

  // ── Voice-over ──
  // Stop any narration in flight, whether the Gemini audio or the browser voice.
  function stopNarration() {
    narrGenRef.current += 1; // invalidate any narration TTS request still in flight
    if (hasTTS) { try { window.speechSynthesis.cancel(); } catch (e) {} }
    if (narrAudioRef.current) {
      const a = narrAudioRef.current; narrAudioRef.current = null;
      try { a.pause(); } catch (e) {}
      try { if (a.src) URL.revokeObjectURL(a.src); } catch (e) {}
    }
  }
  // Dispatcher: prefer the natural Gemini narrator voice; fall back to the
  // browser voice on any failure. An empty text just stops narration.
  function speakText(text, onEnd) {
    stopNarration();
    if (muted || !text) return;
    if (hasAITTS()) { speakTextAI(text, onEnd); return; }
    speakTextBrowser(text, onEnd);
  }
  async function speakTextAI(text, onEnd) {
    const gen = narrGenRef.current; // capture AFTER stopNarration (called by speakText) bumped it
    setSpeaking(true); setPaused(false);
    try {
      const url = await window.claude.tts(text, NARRATOR_VOICE);
      // A newer narration (or a stop) started while fetching — drop this one.
      if (narrGenRef.current !== gen) { try { URL.revokeObjectURL(url); } catch (e) {} return; }
      if (muted) { try { URL.revokeObjectURL(url); } catch (e) {} setSpeaking(false); return; }

      narrAudioRef.current = a;
      const done = (fire) => {
        if (narrAudioRef.current === a) narrAudioRef.current = null;
        try { URL.revokeObjectURL(url); } catch (e) {}

        if (fire && onEnd) onEnd();

      a.onerror = () => done(true);

        || voices.find((x) => /^en/i.test(x.lang)) || voices[0];
      if (v) u.voice = v;
      u.onstart = () => { setSpeaking(true); setPaused(false); };
      u.onend = () => { setSpeaking(false); setPaused(false); if (onEnd) onEnd(); };
      u.onerror = () => { setSpeaking(false); setPaused(false); if (onEnd) onEnd(); };

  }

  useEffect(() => {
    if (!canSpeak) return undefined;
    stopNarration(); setSpeaking(false); setPaused(false);

      if (slide && (slide.type === 'roleplay' || slide.type === 'capstone')) {
        return () => { stopNarration(); };
      }
      // Auto-narrate only the FIRST time a slide is reached. Revisiting a slide
      // you've already heard (Back, or jumping via the contents) stays silent —
      // the Play button still re-narrates on demand.
      if (p.narrated && p.narrated[slide.id]) {
        return () => { stopNarration(); };
      }
      const t = setTimeout(speakCurrent, 300);
      setP((prev) => ({ ...prev, narrated: { ...(prev.narrated || {}), [slide.id]: true } }));
      return () => { clearTimeout(t); stopNarration(); };
    }
    return () => { stopNarration(); };
  }, [index, muted, p.story]);
  useEffect(() => () => { stopNarration(); }, []);

  // Belt-and-suspenders: silence any roleplay/capstone ringtone whenever the
  // current slide is not a call-capable one — kills an orphaned ring that would
  // otherwise keep looping across unrelated slides.
  useEffect(() => {
    const t = slide && slide.type;
    if (t !== 'roleplay' && t !== 'capstone') {
      const kill = () => { try { window.Interactions && window.Interactions.silenceAudio && window.Interactions.silenceAudio(); } catch (e) {} };
      kill();
      const t1 = setTimeout(kill, 400);
      const t2 = setTimeout(kill, 1200);
      return () => { clearTimeout(t1); clearTimeout(t2); };
    }
  }, [index]);

  const toggleMute = () => { stopNarration(); setSpeaking(false); setPaused(false); update({ muted: !muted }); };
  const togglePlay = () => {
    if (!canSpeak) return;
    if (muted) { update({ muted: false }); return; }
    // Gemini audio path: pause/resume the <audio> element.
    const a = narrAudioRef.current;
    if (a) {
      if (!a.paused && !a.ended) { a.pause(); setPaused(true); }
      else if (a.paused && !a.ended) { a.play().catch(() => {}); setPaused(false); }
      else { speakCurrent(); }
      return;
    }
    // Browser voice path.
    if (hasTTS && speaking && !paused) { window.speechSynthesis.pause(); setPaused(true); }
    else if (hasTTS && paused) { window.speechSynthesis.resume(); setPaused(false); }
    else { speakCurrent(); }
  };

  const retryQuiz = () => {
    const firstQ = SLIDES.findIndex((s) => s.type === 'question');
    navLock.current = true; setLeaving(true);
    setTimeout(() => { setP((prev) => ({ ...prev, answers: {}, index: firstQ })); setLeaving(false); navLock.current = false; }, EXIT_MS);
  };

  // ── render the active slide body ──
  function renderSlide() {
    switch (slide.type) {
      case 'cover': return <S.Cover meta={COURSE.meta} resumed={index > 0} onStart={next} story={true} storyData={COURSE.story.cover} onToggleStory={null} name={p.name || ''} onName={(v) => update({ name: v })} />;
      case 'objectives': return <S.Objectives objectives={sl.objectives} story={p.story} name={p.name || ''} />;
      case 'agenda': return <S.Agenda agenda={sl.agenda} story={p.story} />;
      case 'section': return <S.SectionDivider slide={sl} story={p.story} onContinue={next} />;
      case 'content': return <S.ContentSlide slide={sl} />;
      case 'summary': return <S.Summary summary={sl.summary} story={p.story} />;
      case 'complete': return <S.Complete meta={COURSE.meta} score={capstoneScore} onRestart={restart} name={p.name || ''} onName={(v) => update({ name: v })} onDownload={() => downloadCertificate((p.name || '').trim() || 'Lumina Learner', capstoneScore)} />;
      case 'tabs': return <X.Tabs slide={sl} viewed={p.tabs[sl.id]} onNarrate={speakText} onView={(i) => update({ tabs: { ...p.tabs, [sl.id]: { ...(p.tabs[sl.id] || {}), [i]: true } } })} />;
      case 'hotspots': return <X.Hotspots slide={sl} opened={p.hotspots[sl.id]} onNarrate={speakText} onOpen={(i) => update({ hotspots: { ...p.hotspots, [sl.id]: { ...(p.hotspots[sl.id] || {}), [i]: true } } })} />;
      case 'dragdrop': return <X.DragDrop slide={sl} state={p.drag[sl.id]} onChange={(st) => update({ drag: { ...p.drag, [sl.id]: st } })} />;
      case 'reflect': return <X.Reflect slide={sl} state={p.reflections[sl.id]} onChange={(st) => update({ reflections: { ...p.reflections, [sl.id]: st } })} />;
      case 'scenario': return <X.Scenario slide={sl} state={p.scenarios[sl.id]} onNarrate={speakText} onChange={(st) => update({ scenarios: { ...p.scenarios, [sl.id]: st } })} />;
      case 'roleplay': return <X.Roleplay slide={sl} state={p.scenarios[sl.id]} onNarrate={speakText} canNarrate={hasTTS && !muted} onChange={(st) => update({ scenarios: { ...p.scenarios, [sl.id]: st } })} />;
      case 'capstone': return <X.Roleplay slide={sl} state={p.scenarios[sl.id]} onNarrate={speakText} canNarrate={hasTTS && !muted} onChange={(st) => update({ scenarios: { ...p.scenarios, [sl.id]: st } })} />;
      case 'question': return <X.Question slide={sl} state={p.answers[sl.data.id]} onChange={(st) => update({ answers: { ...p.answers, [sl.data.id]: st } })} />;
      case 'results': return <X.Results slide={sl} correct={quizCorrect} total={COURSE.quiz.length} onRetry={retryQuiz} name={p.name || ''} />;
      default: return null;
    }
  }

  const progressPct = Math.round((index / (SLIDES.length - 1)) * 100);

  if (immersive) {
    return <div style={{ height: '100%', width: '100%' }} data-screen-label={slide.section}>{renderSlide()}</div>;
  }

  const voBtn = { width: 34, height: 34, borderRadius: 'var(--radius-md)', border: '1px solid var(--color-border)', background: 'var(--color-surface)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 };

  return (
    <div style={{ height: '100%', display: 'flex', background: 'var(--color-bg)' }} data-screen-label={`${slide.section} — ${index + 1}/${SLIDES.length}`}>
      {/* desktop TOC */}
      <div className="toc-desktop">
        <S.TOCSidebar toc={COURSE.toc} slides={SLIDES} currentIndex={index} furthest={furthest} onJump={goTo} />
      </div>
      {/* mobile TOC drawer */}
      {tocOpen && (
        <div onClick={() => setTocOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 40, background: 'rgba(26,46,53,0.35)', backdropFilter: 'blur(2px)', display: 'flex' }}>
          <div onClick={(e) => e.stopPropagation()} style={{ height: '100%' }}>
            <S.TOCSidebar isDrawer toc={COURSE.toc} slides={SLIDES} currentIndex={index} furthest={furthest} onJump={goTo} onClose={() => setTocOpen(false)} />
          </div>
        </div>
      )}

      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
      {/* progress line */}
      <div style={{ height: 4, background: 'var(--color-primary-subtle)', flexShrink: 0 }}>
        <div style={{ height: '100%', width: `${progressPct}%`, background: 'linear-gradient(90deg, var(--color-primary-muted), var(--color-primary))', transition: 'width var(--transition-slow)' }} />
      </div>

      {/* header */}
      <header style={{ flexShrink: 0, height: 60, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 clamp(14px,3vw,28px)', borderBottom: '1px solid var(--color-border-light)', background: 'var(--color-surface)', gap: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, minWidth: 0 }}>
          <button className="toc-hamburger" onClick={() => setTocOpen(true)} aria-label="Open contents" style={{ ...voBtn, display: 'none' }}>
            <I.Menu size={18} stroke="var(--color-text-secondary)" />
          </button>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 }}>
            <span style={{ fontFamily: 'var(--font-display)', fontSize: 17, color: 'var(--color-text-primary)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{COURSE.meta.title}</span>
            <span style={{ width: 4, height: 4, borderRadius: '50%', background: 'var(--color-border)', flexShrink: 0 }} className="hide-sm" />
            <span className="hide-sm" style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--color-accent)', whiteSpace: 'nowrap' }}>{slide.section}</span>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, flexShrink: 0 }}>
          {canSpeak && !muted && (
            <div className="hide-sm" style={{ display: 'flex', alignItems: 'center', gap: 7, marginRight: 2 }}>
              <div className="eq" data-on={speaking && !paused ? 'true' : 'false'}><span></span><span></span><span></span></div>
              <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.05em', textTransform: 'uppercase', color: speaking ? 'var(--color-primary)' : 'var(--color-text-muted)' }}>{speaking ? (paused ? 'Paused' : 'Narrating') : 'Narration'}</span>
            </div>
          )}
          {canSpeak && (
            <button onClick={togglePlay} aria-label="Play or pause narration" style={voBtn}>
              {(!muted && speaking && !paused) ? <I.Pause size={15} stroke="var(--color-primary)" /> : <I.Play size={15} stroke="var(--color-text-secondary)" />}
            </button>
          )}
          {canSpeak && (
            <button onClick={toggleMute} aria-label={muted ? 'Turn narration on' : 'Mute narration'} style={{ ...voBtn, background: muted ? 'var(--color-surface)' : 'var(--color-primary-subtle)', borderColor: muted ? 'var(--color-border)' : 'var(--color-primary-muted)' }}>
              {muted ? <I.VolumeX size={15} stroke="var(--color-text-muted)" /> : <I.Volume2 size={15} stroke="var(--color-primary)" />}
            </button>
          )}
          <span className="hide-sm" style={{ fontFamily: 'var(--font-mono)', fontSize: 12.5, color: 'var(--color-text-muted)' }}>{index + 1} / {SLIDES.length}</span>
          <button onClick={restart} aria-label="Restart module" style={voBtn}>
            <I.RotateCcw size={16} stroke="var(--color-text-secondary)" />
          </button>
        </div>
      </header>

      {/* content */}
      <main style={{ flex: 1, overflowY: 'auto', minHeight: 0, display: 'flex', flexDirection: 'column' }}>
        <SlideStage key={index} leaving={leaving} fullBleed={fullBleed}>
          {renderSlide()}
        </SlideStage>
      </main>

      {/* footer nav */}
      <footer style={{ flexShrink: 0, minHeight: 76, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px clamp(16px,3vw,32px)', borderTop: '1px solid var(--color-border-light)', background: 'var(--color-surface)', gap: 12 }}>
        <Button variant="ghost" iconLeft={<I.ArrowLeft size={16} />} onClick={back} disabled={index === 0} style={{ visibility: index === 0 ? 'hidden' : 'visible' }}>Back</Button>
        {!canAdvance && !hideNext && (
          <span className="hide-sm" style={{ display: 'inline-flex', alignItems: 'center', gap: 8, fontSize: 13, fontWeight: 600, color: 'var(--color-text-muted)' }}>
            <I.Lock size={14} stroke="var(--color-text-muted)" /> Complete the activity to continue
          </span>
        )}
        {!hideNext && (
          slide.type === 'summary'
            ? <Button variant="accent" iconRight={<I.ArrowRight size={16} />} onClick={next}>Finish module</Button>
            : <Button variant="primary" iconRight={<I.ArrowRight size={16} />} onClick={next} disabled={!canAdvance}>Continue</Button>
        )}
        {hideNext && <span />}
      </footer>
      </div>
    </div>
  );
}

function __mount() { ReactDOM.createRoot(document.getElementById('root')).render(<App />); }
if (document.fonts && document.fonts.ready) {
  Promise.race([document.fonts.ready, new Promise((r) => setTimeout(r, 1500))]).then(__mount);
} else { __mount(); }
</script>
<style>
  @media (max-width: 560px) { .hide-sm { display: none !important; } }
  .toc-hamburger { display: none; }
  @media (max-width: 880px) {
    .toc-desktop { display: none !important; }
    .toc-hamburger { display: inline-flex !important; }
  }
  .eq { display: inline-flex; align-items: flex-end; gap: 2px; height: 14px; }
  .eq span { width: 3px; height: 4px; background: var(--color-primary-muted); border-radius: 2px; transition: height 0.2s; }
  .eq[data-on="true"] span { background: var(--color-primary); animation: eqbar 0.9s ease-in-out infinite; }
  .eq[data-on="true"] span:nth-child(2) { animation-delay: 0.15s; }
  .eq[data-on="true"] span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes eqbar { 0%, 100% { height: 4px; } 50% { height: 14px; } }
  .rp-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-primary-muted); display: inline-block; animation: rpDot 1.1s ease-in-out infinite; }
  @keyframes rpDot { 0%, 80%, 100% { opacity: 0.3; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-3px); } }
  @media (prefers-reduced-motion: reduce) { .rp-dot { animation: none; } }
  /* call simulator */
  .rp-call-ring { animation: rpRing 2.6s ease-in-out infinite; }
  @keyframes rpRing { 0%,100% { transform: scale(1); opacity: 0.55; } 50% { transform: scale(1.12); opacity: 0.15; } }
  .rp-mic-live::before { content: ''; position: absolute; inset: -10px; border-radius: 50%; border: 2px solid var(--color-accent); animation: rpMic 1.4s ease-out infinite; }
  @keyframes rpMic { 0% { transform: scale(0.85); opacity: 0.8; } 100% { transform: scale(1.45); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .rp-call-ring, .rp-mic-live::before { animation: none; } }
  /* animated call walk-through */
  .rp-guide-focus::after { content: ''; position: absolute; inset: -7px; border-radius: 50%; border: 2px solid var(--color-accent-light); animation: rpGuideRing 1.6s ease-out infinite; pointer-events: none; }
  @keyframes rpGuideRing { 0% { transform: scale(0.9); opacity: 0.75; } 100% { transform: scale(1.55); opacity: 0; } }
  .rp-guide-cap { animation: rpGuideFade 0.5s ease both; }
  @keyframes rpGuideFade { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { .rp-guide-focus::after, .rp-guide-cap { animation: none; } }
  .rp-guide-cta { animation: rpGuideCta 1.5s ease-in-out infinite; }
  @keyframes rpGuideCta { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @media (prefers-reduced-motion: reduce) { .rp-guide-cta { animation: none; } }
</style>
</body>
</html>
