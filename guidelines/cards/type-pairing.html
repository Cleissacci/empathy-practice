<!-- @dsCard group="Type" viewport="700x230" name="Pairing in Use" subtitle="Cormorant display over Nunito body" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 28px; }
  .card { background: var(--color-surface); border-radius: var(--radius-xl); padding: 30px; box-shadow: var(--shadow-md); border: 1px solid var(--color-border-light); }
  .eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); margin-bottom: 8px; }
  .h { font-family: var(--font-display); font-size: 36px; font-weight: 400; line-height: 1.15; color: var(--color-text-primary); margin: 0 0 14px; }
  .h em { color: var(--color-primary-muted); font-style: italic; }
  .b { font-size: 16px; line-height: 1.7; color: var(--color-text-secondary); max-width: 560px; margin: 0; }
</style></head>
<body>
  <div class="card">
    <div class="eyebrow">Module 3 — Perspective Taking</div>
    <h2 class="h">What does it mean <em>to truly listen?</em></h2>
    <p class="b">Empathy begins before we speak. It begins in the quality of our attention — in how we hold space for another person's experience before we name, judge, or respond.</p>
  </div>
</body></html>
