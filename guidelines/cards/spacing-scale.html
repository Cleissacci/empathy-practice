<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing Scale" subtitle="4px base grid · every value a multiple of 4" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--color-surface); font-family: var(--font-body); padding: 24px; }
  .r { display: flex; align-items: center; gap: 16px; padding: 5px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); width: 90px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-muted); width: 44px; }
  .bar { height: 14px; background: linear-gradient(90deg, var(--color-primary-muted), var(--color-primary)); border-radius: var(--radius-full); }
</style></head>
<body>
  <div class="r"><div class="tok">--space-1</div><div class="px">4px</div><div class="bar" style="width:4px"></div></div>
  <div class="r"><div class="tok">--space-2</div><div class="px">8px</div><div class="bar" style="width:8px"></div></div>
  <div class="r"><div class="tok">--space-3</div><div class="px">12px</div><div class="bar" style="width:12px"></div></div>
  <div class="r"><div class="tok">--space-4</div><div class="px">16px</div><div class="bar" style="width:16px"></div></div>
  <div class="r"><div class="tok">--space-6</div><div class="px">24px</div><div class="bar" style="width:24px"></div></div>
  <div class="r"><div class="tok">--space-8</div><div class="px">32px</div><div class="bar" style="width:32px"></div></div>
  <div class="r"><div class="tok">--space-12</div><div class="px">48px</div><div class="bar" style="width:48px"></div></div>
  <div class="r"><div class="tok">--space-16</div><div class="px">64px</div><div class="bar" style="width:64px"></div></div>
  <div class="r"><div class="tok">--space-24</div><div class="px">96px</div><div class="bar" style="width:96px"></div></div>
</body></html>
