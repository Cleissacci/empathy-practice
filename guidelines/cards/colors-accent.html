<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Warm Amber & Rose" subtitle="Warmth, human connection, optimism" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--color-border-light); background: var(--color-surface); }
  .chip { height: 80px; }
  .meta { padding: 10px 12px; }
  .nm { font-size: 13px; font-weight: 700; color: var(--color-text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#C4956A"></div><div class="meta"><div class="nm">Accent Amber</div><div class="hex">#C4956A</div><div class="tok">--color-accent</div></div></div>
    <div class="sw"><div class="chip" style="background:#E8C5A0"></div><div class="meta"><div class="nm">Amber Light</div><div class="hex">#E8C5A0</div><div class="tok">--color-accent-light</div></div></div>
    <div class="sw"><div class="chip" style="background:#F7EDDF"></div><div class="meta"><div class="nm">Amber Subtle</div><div class="hex">#F7EDDF</div><div class="tok">--color-accent-subtle</div></div></div>
    <div class="sw"><div class="chip" style="background:#C47878"></div><div class="meta"><div class="nm">Warm Rose</div><div class="hex">#C47878</div><div class="tok">--color-warm-rose</div></div></div>
    <div class="sw"><div class="chip" style="background:#F2DEDE"></div><div class="meta"><div class="nm">Rose Subtle</div><div class="hex">#F2DEDE</div><div class="tok">--color-warm-rose-sub</div></div></div>
  </div>
</body></html>
