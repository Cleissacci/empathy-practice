<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Deep Teal" subtitle="Trust, calm, growth · main brand color" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--color-border-light); background: var(--color-surface); }
  .chip { height: 80px; }
  .meta { padding: 10px 12px; }
  .nm { font-size: 13px; font-weight: 700; color: var(--color-text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#2A5C6B"></div><div class="meta"><div class="nm">Primary</div><div class="hex">#2A5C6B</div><div class="tok">--color-primary</div></div></div>
    <div class="sw"><div class="chip" style="background:#3A7A8C"></div><div class="meta"><div class="nm">Primary Light</div><div class="hex">#3A7A8C</div><div class="tok">--color-primary-light</div></div></div>
    <div class="sw"><div class="chip" style="background:#7B9E9B"></div><div class="meta"><div class="nm">Sage Teal</div><div class="hex">#7B9E9B</div><div class="tok">--color-primary-muted</div></div></div>
    <div class="sw"><div class="chip" style="background:#D4EDE9"></div><div class="meta"><div class="nm">Teal Subtle</div><div class="hex">#D4EDE9</div><div class="tok">--color-primary-subtle</div></div></div>
  </div>
</body></html>
