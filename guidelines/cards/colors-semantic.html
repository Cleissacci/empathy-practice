<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Success, warning, error, info — always paired with a label" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--color-border-light); background: var(--color-surface); }
  .chip { height: 64px; display: flex; align-items: flex-end; padding: 8px; }
  .sub { height: 16px; }
  .meta { padding: 10px 12px; }
  .nm { font-size: 13px; font-weight: 700; color: var(--color-text-primary); }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#4A9B8A"></div><div class="sub" style="background:#D4EDE9"></div><div class="meta"><div class="nm">Success</div><div class="tok">--color-success</div></div></div>
    <div class="sw"><div class="chip" style="background:#C4956A"></div><div class="sub" style="background:#F7EDDF"></div><div class="meta"><div class="nm">Warning</div><div class="tok">--color-warning</div></div></div>
    <div class="sw"><div class="chip" style="background:#B85C5C"></div><div class="sub" style="background:#F2DEDE"></div><div class="meta"><div class="nm">Error</div><div class="tok">--color-error</div></div></div>
    <div class="sw"><div class="chip" style="background:#2A5C6B"></div><div class="sub" style="background:#D4EDE9"></div><div class="meta"><div class="nm">Info</div><div class="tok">--color-info</div></div></div>
  </div>
</body></html>
